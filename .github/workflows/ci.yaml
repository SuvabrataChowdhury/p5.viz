name: p5.viz CI

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened]

jobs:
  central-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Lint UI
        shell: bash
        run: npm ci && npm run lint
